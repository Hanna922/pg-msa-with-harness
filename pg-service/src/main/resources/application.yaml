spring:
  application:
    name: pg-service
  datasource:
    url: ${PG_DATASOURCE_URL:jdbc:h2:file:./pg-service-data/pgdb;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
    username: ${PG_DATASOURCE_USERNAME:sa}
    password: ${PG_DATASOURCE_PASSWORD:}
    driver-class-name: ${PG_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

pg:
  client:
    card-authorization:
      connect-timeout-ms: ${PG_CARD_AUTH_CONNECT_TIMEOUT_MS:1000}
      read-timeout-ms: ${PG_CARD_AUTH_READ_TIMEOUT_MS:3000}
      retry:
        max-attempts: ${PG_CARD_AUTH_RETRY_MAX_ATTEMPTS:2}
