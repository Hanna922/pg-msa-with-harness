spring:
  datasource:
    url: ${PG_DATASOURCE_URL:jdbc:h2:file:/tmp/pgdb;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
    username: ${PG_DATASOURCE_USERNAME:sa}
    password: ${PG_DATASOURCE_PASSWORD:}
    driver-class-name: ${PG_DATASOURCE_DRIVER:org.h2.Driver}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
