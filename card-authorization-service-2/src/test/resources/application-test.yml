spring:
  datasource:
    url: jdbc:h2:mem:cardauth2test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      encoding: UTF-8

  security:
    user:
      name: card
      password: card123

eureka:
  client:
    enabled: false
